{
  "storage_root": "data",
  "state_root": "state",
  "logs_root": "logs",
  "poll_interval_seconds": 1800,
  "file_extensions": [
    ".xlsx",
    ".xls"
  ],
  "channel_allowlist": [],
  "channel_blocklist": [],
  "filename_filter": {
    "include_patterns": [
      "核心数据集",
      "押注工具"
    ],
    "exclude_patterns": [],
    "match_mode": "contains",
    "case_sensitive": false
  },
  "dataset_rules": {
    "core": [
      "核心数据集"
    ],
    "instruments": [
      "押注工具"
    ]
  },
  "zsxq": {
    "base_url": "https://api.zsxq.com",
    "topics_url_template": "/v2/groups/{group_id}/topics?scope=all&count={count}",
    "download_url_template": "/v2/files/{file_id}/download_url",
    "topics_page_size": 20,
    "search_page_size": 10,
    "cookie": "",
    "user_agent": "Mozilla/5.0",
    "group_ids": [
      "51112284418814"
    ]
  },
  "dashboard": {
    "market_map": {
      "dataset_types": [
        "core",
        "instruments"
      ],
      "fields": {
        "asset_id": "asset_code",
        "asset_name": "asset_name",
        "asset_class": "dataset_type",
        "trend_score": "capped_final_trend_score",
        "trend_state": "state_name",
        "rs_score": "rs_score",
        "rs_state": "current_relative_state",
        "flow_score": "funding_leverage_value",
        "flow_state": "funding_signal_direction",
        "leverage_value": "funding_leverage_value",
        "leverage_velocity": "leverage_velocity",
        "leverage_velocity_score": "leverage_velocity_score"
      },
      "quadrants": {
        "x_midline": 0,
        "y_midline": 0
      },
      "thresholds": {
        "long_trend_threshold": 70,
        "long_rs_threshold": 70,
        "long_flow_threshold": 50,
        "short_trend_threshold": -70,
        "short_rs_threshold": -70,
        "short_flow_threshold": -50
      },
      "size": {
        "min": 8,
        "max": 42
      },
      "colors": {
        "Leveraging": "#1f9d55",
        "Deleveraging": "#d64545",
        "Neutral": "#7a869a"
      },
      "symbols": {
        "core": "circle",
        "instruments": "diamond"
      }
    }
  }
}
